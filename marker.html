<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>QR Anchored AR</title>

		<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

		<style>
			body {
				margin: 0;
				overflow: hidden;
			}
		</style>
	</head>

	<body>
		<a-scene
			embedded
			arjs="sourceType: webcam; detectionMode: mono_and_matrix;"
			renderer="logarithmicDepthBuffer: true;">
			<!-- QR / marker -->
			<a-marker
				type="pattern"
				url="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@master/data/data/patt.hiro">
				<a-entity gltf-model="model.glb" scale="0.5 0.5 0.5" position="0 0 0">
				</a-entity>
			</a-marker>

			<a-entity camera></a-entity>
		</a-scene>
	</body>
</html>
