<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebAR Demo</title>

		<script
			type="module"
			src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: #000;
			}
			model-viewer {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<model-viewer
			src="model.glb"
			ar
			ar-modes="scene-viewer quick-look webxr"
			camera-controls
			auto-rotate
			shadow-intensity="1"
			exposure="1"
			alt="AR object">
		</model-viewer>
	</body>
</html>
